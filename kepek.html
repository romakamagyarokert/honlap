<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kedves képek</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
}

header{
  background:linear-gradient(90deg,#c00,#fff,#090);
  padding:20px;
  text-align:center;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
}

.card{
  background:white;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
  display:block;
}

.caption{
  padding:10px;
  font-size:14px;
}

.btn{
  display:block;
  text-align:center;
  background:#1877f2;
  color:white;
  padding:10px;
  text-decoration:none;
}
</style>

</head>

<body>

<header>
  <h1>Kedves képek</h1>
  <p>Aranyos pillanatok megosztásra</p>
</header>

<div class="container">

  <div class="grid">

    <div class="card">
      <img src="1.png" alt="Kedves kép">
      <div class="caption">„Egy mosoly mindent megváltoztat.”</div>
      <a class="btn" href="https://facebook.com/share" target="_blank">Megosztás</a>
    </div>

    <div class="card">
      <img src="kep2.jpg" alt="Kedves kép">
      <div class="caption">„A kedvesség csendben érkezik.”</div>
      <a class="btn" href="https://facebook.com/share" target="_blank">Megosztás</a>
    </div>

  </div>

</div>

</body>
</html>
